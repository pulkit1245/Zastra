spring.application.name=ZastraBackend

# --- Database Setup ---
spring.datasource.url=jdbc:h2:mem:devforge;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- Flyway Config ---
spring.flyway.enabled=false

# --- Security (JWT) ---
jwt.secret=${JWT_SECRET:REPLACE_WITH_A_REAL_SECRET_KEY_THAT_IS_LONG_ENOUGH_FOR_HS256_32CHARS_MIN}
jwt.expiration=86400000

# ─── Redis ──────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ─── Kafka ──────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=devforge-group
spring.kafka.consumer.auto-offset-reset=earliest

# ─── Actuator ───────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# ─── Python API ─────────────────────────────────────────────────────────────
python.api.base-url=${PYTHON_API_BASE_URL:http://127.0.0.1:8000}