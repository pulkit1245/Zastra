##############################################################################
#  Spring Boot — PRODUCTION profile
#  Active when: SPRING_PROFILES_ACTIVE=prod  (set by Render)
#
#  This file OVERRIDES application.properties for production.
#  All sensitive values are read from Render environment variables — never
#  hard-coded here.
##############################################################################

# ─── Application ─────────────────────────────────────────────────────────────
spring.application.name=ZastraBackend

# ─── Database (Render Managed PostgreSQL) ────────────────────────────────────
# Render injects DATABASE_URL as: postgresql://user:pass@host:port/dbname
# Spring Boot needs the jdbc: prefix, so we prepend it here.
# The PostgreSQL JDBC driver supports credentials embedded in the URL.
spring.datasource.url=jdbc:${DATABASE_URL}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ─── Flyway (run migrations on startup) ──────────────────────────────────────
spring.flyway.enabled=true

# ─── Redis (Render Managed Redis) ────────────────────────────────────────────
# Render's Redis connectionString is: rediss://user:pass@host:port
# (note double-s = TLS). Spring Boot's spring.data.redis.url handles this
# natively — no extra SSL config needed.
spring.data.redis.url=${REDIS_URL}

# ─── Kafka (Upstash — SASL/SSL) ──────────────────────────────────────────────
# Get KAFKA_BOOTSTRAP_SERVERS, KAFKA_API_KEY, KAFKA_API_SECRET
# from your Upstash Kafka cluster at https://console.upstash.com/kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_API_KEY}" password="${KAFKA_API_SECRET}";
spring.kafka.consumer.group-id=devforge-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.retries=3

# ─── Security (JWT) ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ─── Python Scraper ──────────────────────────────────────────────────────────
# Render resolves internal service URLs automatically via the hostport property.
python.api.base-url=http://${PYTHON_API_HOSTPORT}

# ─── Disable dev tools ───────────────────────────────────────────────────────
spring.h2.console.enabled=false
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ─── Actuator (health check for Render) ──────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
