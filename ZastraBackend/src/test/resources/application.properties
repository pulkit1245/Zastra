spring.application.name=ZastraBackend-Test

# ─── Database ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ─── Flyway ─────────────────────────────────────────────────────────────────
# Disable flyway for H2 so hibernate auto creates the schema
spring.flyway.enabled=false

# ─── JWT ────────────────────────────────────────────────────────────────────
# Static testing key
jwt.secret=testing-secret-key-that-is-long-enough-for-hs256-compliance
jwt.expiration=86400000

# ─── Mock Services ────────────────────────────────────────────────────────
# Disable any auto-connecting listeners or complex background schedules if any.
python.api.base-url=http://mock-url
